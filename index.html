<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="色彩検定" />
  <meta name="theme-color" content="#F7F5F2" />
  <title>色彩検定トレーナー</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app" id="app">

    <!-- ===== HOME ===== -->
    <div id="screen-home" class="screen active">
      <div class="home">
        <div class="home-hero">
          <div class="home-logo"><span>色</span></div>
          <h1 class="home-title">色彩検定トレーナー</h1>
          <p class="home-desc">3級・2級対応の問題演習と色見本</p>
        </div>
        <p class="section-label">Study</p>
        <div class="menu-card" onclick="showScreen('grade')">
          <div class="menu-icon quiz">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          </div>
          <div class="menu-text"><h3>問題演習</h3><p>4択クイズで知識を確認</p></div>
          <div class="menu-arrow"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div>
        </div>
        <div class="menu-card" onclick="showScreen('colorList')">
          <div class="menu-icon palette">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="10.5" r="2.5"/><circle cx="8.5" cy="7.5" r="2.5"/><circle cx="6.5" cy="12.5" r="2.5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>
          </div>
          <div class="menu-text"><h3>色見本・カラーリスト</h3><p>基本色名・PCCS・慣用色名</p></div>
          <div class="menu-arrow"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div>
        </div>

        <p class="section-label" style="margin-top:20px">Training</p>
        <div class="menu-card" onclick="startTraining()">
          <div class="menu-icon training">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </div>
          <div class="menu-text"><h3>色感覚トレーニング</h3><p>色を見てトーン記号×色相番号を当てる</p></div>
          <div class="menu-arrow"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div>
        </div>
        <div class="menu-card" onclick="showStats()">
          <div class="menu-icon stats">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
          </div>
          <div class="menu-text"><h3>苦手分析</h3><p>トーン・色相ごとの正答率を確認</p></div>
          <div class="menu-arrow"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div>
        </div>
      </div>
    </div>

    <!-- ===== GRADE SELECT ===== -->
    <div id="screen-grade" class="screen">
      <div class="header">
        <button class="header-back" onclick="showScreen('home')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button>
        <div class="header-title">問題演習</div>
      </div>
      <div class="grade-select">
        <p class="section-label" style="margin-bottom:16px">Select Grade</p>
        <button class="grade-btn" onclick="startQuiz('3級')"><span>3級</span><span class="count" id="count-3"></span></button>
        <button class="grade-btn" onclick="startQuiz('2級')"><span>2級</span><span class="count" id="count-2"></span></button>
      </div>
    </div>

    <!-- ===== QUIZ ===== -->
    <div id="screen-quiz" class="screen">
      <div class="header">
        <button class="header-back" onclick="showScreen('grade')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button>
        <div class="header-title" id="quiz-header-title"></div>
      </div>
      <div class="quiz-area">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="quiz-counter" id="quiz-counter"></div>
        <div class="quiz-category" id="quiz-category"></div>
        <h2 class="quiz-question" id="quiz-question"></h2>
        <div id="choices-container"></div>
        <div id="explanation-container"></div>
      </div>
      <div class="quiz-footer" id="quiz-footer">
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題</button>
      </div>
    </div>

    <!-- ===== RESULT ===== -->
    <div id="screen-result" class="screen">
      <div class="header">
        <button class="header-back" onclick="showScreen('grade')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button>
        <div class="header-title" id="result-header-title"></div>
      </div>
      <div class="result">
        <div class="result-circle">
          <div class="result-score" id="result-pct"></div>
          <div class="result-total" id="result-total"></div>
        </div>
        <h2 class="result-message" id="result-message"></h2>
        <p class="result-sub" id="result-sub"></p>
        <div class="result-actions">
          <button class="result-btn" onclick="showScreen('home')">ホーム</button>
          <button class="result-btn primary" onclick="startQuiz(currentGrade)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            もう一度
          </button>
        </div>
      </div>
    </div>

    <!-- ===== COLOR LIST ===== -->
    <div id="screen-colorList" class="screen">
      <div class="header">
        <button class="header-back" onclick="showScreen('home')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button>
        <div class="header-title">色見本・カラーリスト</div>
      </div>
      <div class="color-list">
        <div class="tab-bar" id="tab-bar"></div>
        <div class="color-grid" id="color-grid"></div>
      </div>
    </div>

    <!-- ===== COLOR TRAINING ===== -->
    <div id="screen-training" class="screen">
      <div class="header">
        <button class="header-back" onclick="stopTraining()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button>
        <div class="header-title">色感覚トレーニング</div>
      </div>
      <div class="training-area">
        <div class="training-progress-bar"><div class="training-progress-fill" id="training-progress-fill"></div></div>
        <div class="training-counter" id="training-counter"></div>
        <div class="training-swatch" id="training-swatch">
          <span class="training-hint" id="training-hint"></span>
        </div>
        <p class="training-prompt">この色のトーン記号と色相番号は？</p>
        <div id="training-choices"></div>
        <div id="training-explanation"></div>
      </div>
      <div class="quiz-footer" id="training-footer">
        <button class="next-btn" id="training-next-btn" onclick="nextTraining()">次の問題</button>
      </div>
    </div>

    <!-- ===== TRAINING RESULT ===== -->
    <div id="screen-trainingResult" class="screen">
      <div class="header">
        <button class="header-back" onclick="showScreen('home')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button>
        <div class="header-title">トレーニング結果</div>
      </div>
      <div class="result">
        <div class="result-circle">
          <div class="result-score" id="training-result-pct"></div>
          <div class="result-total" id="training-result-total"></div>
        </div>
        <h2 class="result-message" id="training-result-message"></h2>
        <p class="result-sub" id="training-result-sub"></p>
        <div class="result-actions">
          <button class="result-btn" onclick="showStats()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
            苦手分析
          </button>
          <button class="result-btn primary" onclick="startTraining()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            もう一度
          </button>
        </div>
      </div>
    </div>

    <!-- ===== STATS ===== -->
    <div id="screen-stats" class="screen">
      <div class="header">
        <button class="header-back" onclick="showScreen('home')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button>
        <div class="header-title">苦手分析</div>
      </div>
      <div class="stats-area">
        <div class="stats-summary">
          <div class="stats-summary-item">
            <span class="stats-summary-value" id="stats-total">0</span>
            <span class="stats-summary-label">総回答数</span>
          </div>
          <div class="stats-summary-item">
            <span class="stats-summary-value correct" id="stats-correct">0</span>
            <span class="stats-summary-label">正解</span>
          </div>
          <div class="stats-summary-item">
            <span class="stats-summary-value wrong" id="stats-wrong">0</span>
            <span class="stats-summary-label">不正解</span>
          </div>
          <div class="stats-summary-item">
            <span class="stats-summary-value" id="stats-rate">—</span>
            <span class="stats-summary-label">正答率</span>
          </div>
        </div>
        <div id="stats-detail"></div>
        <button class="stats-clear-btn" onclick="clearStats()">学習履歴をリセット</button>
      </div>
    </div>

  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
